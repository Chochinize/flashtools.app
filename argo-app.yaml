apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flashtools
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Chochinize/flashtools.app.git'
    targetRevision: HEAD
    path: base
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: flashtools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
