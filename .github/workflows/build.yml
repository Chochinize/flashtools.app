name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'base/kustomization.yaml'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            chochinize/flashtools:${{ github.sha }}
            chochinize/flashtools:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push analytics image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics
          push: true
          tags: |
            chochinize/flashtools-analytics:${{ github.sha }}
            chochinize/flashtools-analytics:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kustomization image tags
        run: |
          sed -i "s|newTag:.*|newTag: ${{ github.sha }}|" base/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base/kustomization.yaml
          git commit -m "ci: deploy ${{ github.sha }} [skip ci]"
          git push
